<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自助法 (Bootstrapping) 可视化动画</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; background-color: #3498db; color: white; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .status { text-align: center; font-weight: bold; margin-bottom: 20px; font-size: 18px; color: #e74c3c; min-height: 25px; }
        .box-container { display: flex; flex-direction: column; gap: 20px; }
        .box { border: 2px dashed #7f8c8d; border-radius: 8px; padding: 15px; min-height: 80px; position: relative; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .box-title { position: absolute; top: -12px; left: 15px; background: white; padding: 0 10px; font-weight: bold; color: #2c3e50; font-size: 14px; }
        
        .ball { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; transition: all 0.3s ease; }
        .ball.highlight { transform: scale(1.3); box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10; }
        .ball.fade { opacity: 0.3; }
        
        /* 色彩定义 */
        .color-1 { background-color: #1abc9c; } .color-2 { background-color: #2ecc71; }
        .color-3 { background-color: #3498db; } .color-4 { background-color: #9b59b6; }
        .color-5 { background-color: #34495e; } .color-6 { background-color: #f1c40f; color: #333; }
        .color-7 { background-color: #e67e22; } .color-8 { background-color: #e74c3c; }
        .color-9 { background-color: #95a5a6; } .color-10 { background-color: #d35400; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>自助法 (Bootstrapping) 采样过程</h2>
    <div class="controls">
        <button id="btn-step" onclick="sampleStep()">抽样一次</button>
        <button id="btn-auto" onclick="autoSample()">自动完成</button>
        <button id="btn-reset" onclick="reset()" style="background-color: #95a5a6;">重置</button>
    </div>
    <div class="status" id="status-text">准备就绪：样本总量 m = 10</div>

    <div class="box-container">
        <div class="box" id="box-D">
            <div class="box-title">初始数据集 D (总样本 m=10)</div>
            </div>

        <div class="box" id="box-D-prime" style="border-color: #27ae60;">
            <div class="box-title">采样数据集 D' (用于训练，有重复)</div>
        </div>

        <div class="box" id="box-OOB" style="border-color: #e74c3c;">
            <div class="box-title">未被抽到的样本 D \ D' (用于测试/包外估计)</div>
        </div>
    </div>
</div>

<script>
    const m = 10;
    let stepCount = 0;
    let originalData = [];
    let sampledIndices = new Set();
    let isAutoRunning = false;

    // 初始化界面
    function init() {
        const boxD = document.getElementById('box-D');
        boxD.innerHTML = '<div class="box-title">初始数据集 D (总样本 m=10)</div>';
        for (let i = 1; i <= m; i++) {
            let ball = document.createElement('div');
            ball.className = `ball color-${i}`;
            ball.id = `ball-original-${i}`;
            ball.innerText = i;
            boxD.appendChild(ball);
            originalData.push(i);
        }
    }

    // 抽样一步
    function sampleStep() {
        if (stepCount >= m) return;

        // 随机选择一个索引 (有放回)
        const randomIndex = Math.floor(Math.random() * m) + 1;
        sampledIndices.add(randomIndex);
        
        // 视觉强调原始数据集中的被选中球
        const originalBall = document.getElementById(`ball-original-${randomIndex}`);
        originalBall.classList.add('highlight');
        
        // 更新状态文字
        document.getElementById('status-text').innerText = `第 ${stepCount + 1} 次抽样：抽中样本 ${randomIndex}`;

        // 延迟一下，展现“复制”进入 D' 的过程
        setTimeout(() => {
            originalBall.classList.remove('highlight');
            
            const boxDPrime = document.getElementById('box-D-prime');
            let copyBall = document.createElement('div');
            copyBall.className = `ball color-${randomIndex}`;
            copyBall.innerText = randomIndex;
            boxDPrime.appendChild(copyBall);
            
            stepCount++;
            
            if (stepCount === m) {
                finishSampling();
            }
        }, 500);
    }

    // 自动抽样
    function autoSample() {
        if (stepCount >= m || isAutoRunning) return;
        isAutoRunning = true;
        document.getElementById('btn-step').disabled = true;
        document.getElementById('btn-auto').disabled = true;
        
        let interval = setInterval(() => {
            if (stepCount < m) {
                sampleStep();
            } else {
                clearInterval(interval);
                isAutoRunning = false;
            }
        }, 800); // 每800毫秒抽一次
    }

    // 完成抽样，计算包外样本
    function finishSampling() {
        document.getElementById('btn-step').disabled = true;
        document.getElementById('btn-auto').disabled = true;
        
        const oobCount = m - sampledIndices.size;
        const oobRatio = ((oobCount / m) * 100).toFixed(1);
        
        document.getElementById('status-text').innerText = `采样完成！共有 ${oobCount} 个样本未被抽中（占比 ${oobRatio}%，理论极值约为 36.8%）。`;

        // 将未被抽中的样本转移到测试集框，并将原始数据集中的对应样本置灰
        const boxOOB = document.getElementById('box-OOB');
        for (let i = 1; i <= m; i++) {
            if (!sampledIndices.has(i)) {
                let originalBall = document.getElementById(`ball-original-${i}`);
                originalBall.classList.add('fade');
                
                let oobBall = document.createElement('div');
                oobBall.className = `ball color-${i}`;
                oobBall.innerText = i;
                boxOOB.appendChild(oobBall);
            }
        }
    }

    // 重置
    function reset() {
        stepCount = 0;
        sampledIndices.clear();
        originalData = [];
        isAutoRunning = false;
        
        document.getElementById('btn-step').disabled = false;
        document.getElementById('btn-auto').disabled = false;
        document.getElementById('status-text').innerText = `准备就绪：样本总量 m = ${m}`;
        
        document.getElementById('box-D-prime').innerHTML = '<div class="box-title">采样数据集 D\' (用于训练，有重复)</div>';
        document.getElementById('box-OOB').innerHTML = '<div class="box-title">未被抽到的样本 D \\ D\' (用于测试/包外估计)</div>';
        
        init();
    }

    // 页面加载完毕执行初始化
    window.onload = init;
</script>

</body>
</html>
